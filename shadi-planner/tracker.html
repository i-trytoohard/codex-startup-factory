<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker - Shadi Planner</title>
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/forms.css">
  <link rel="stylesheet" href="./css/tabs.css">
  <link rel="stylesheet" href="./css/vendors.css">
  <link rel="stylesheet" href="./css/tracker.css">
  <link rel="stylesheet" href="./css/modal.css">
  <link rel="stylesheet" href="./css/skeleton.css">
</head>
<body>

<nav class="top-nav">
  <div class="top-nav__inner">
    <a class="top-nav__brand" href="./index.html">Shadi Planner</a>
    <a class="top-nav__link" href="./index.html">Home</a>
    <a class="top-nav__link" href="./vendors.html">Vendors</a>
    <a class="top-nav__link" href="./budget.html">Budget</a>
    <a class="top-nav__link active" href="./tracker.html">Tracker</a>
    <a class="top-nav__link" href="./checklist.html">Checklist</a>
  </div>
</nav>

<div class="container">
  <div class="page-hero">
    <h2>Expense Tracker</h2>
    <p>Track all your wedding expenses against your budget</p>
  </div>

  <div class="expense-tracker">
    <div class="expense-bar-bg">
      <div class="expense-bar-fill" id="expenseBar" style="width:0%;background:var(--green);">0%</div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text-secondary);margin-bottom:1rem;">
      <span>Spent: <strong id="totalSpent" style="color:var(--green);">&#8377;0</strong></span>
      <span>Remaining: <strong id="totalRemaining" style="color:var(--gold);">&#8377;0</strong></span>
    </div>
    <div class="expense-row">
      <input type="text" id="expName" class="form-input" placeholder="Expense name">
      <input type="number" id="expAmount" class="form-input" placeholder="Amount" style="width:130px;">
      <button class="btn btn-outline" onclick="addExpense()">Add</button>
    </div>
    <div class="expense-list" id="expenseList"></div>
  </div>
</div>

<footer>Shadi Planner &mdash; Smart budget wedding planning tool</footer>

<script src="./config.local.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/state.js"></script>
<script src="./js/expenses.js"></script>
<script>renderExpenses();</script>

</body>
</html>
